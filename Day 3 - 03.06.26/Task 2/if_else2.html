<html>
    <body>
        <style>
            
        </style>
        <button onclick="handleclick()">ClickMe</button>
        <p style="color:red;font-style: italic;"id="res"></p>
        <script>
            function handleclick(){
                let n=100
                if(n>=10 && n<=50){
                    console.log("Its between 10 and 50")
                    document.getElementById("res").textContent="Its between 10 and 50";
                }
                else if(n>50 && n<=100){
                    console.log("Its between 50 and 100")
                    document.getElementById("res").textContent="Its between 50 and 100";
                }
                else if(n>100){
                    console.log("Its greater than 100")
                    document.getElementById("res").textContent="Its greater than 100";
                }
                else{
                    console.log("Its less than 100")
                    document.getElementById("res").textContent="Its less than 100";
                }
            }
            
        </script>
    </body>
</html>
