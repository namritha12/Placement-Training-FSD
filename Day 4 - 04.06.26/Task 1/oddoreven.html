<html>
    <body>
        <input type="number" id="num1" placeholder="Enter 1st no">
        <input type="number" id="num2" placeholder="Enter 2nd no">
        <button onclick="oddoreven()">ANS</button>
        <p id="result"></p>
    </body>
    <script>
        function oddoreven(){
            let n1=document.getElementById("num1").value;
            let n2=document.getElementById("num2").value;
            let sum=Number(n1)+Number(n2);
            let h=0;
            while(sum>0){
                h=h+(sum%10);
                sum=Math.floor(sum/10);
            }
            
            if(h%2==0){
                document.getElementById("result").textContent="Result is even";
            }
            else{
                document.getElementById("result").textContent="Result is odd";
            }
        }
       
    </script>
</html>
