<html>
<body>
<script>
let mypromise=new Promise(
(resolve,reject)=>{
let success=false;
if(success===true){
resolve("send my ticket");
}
else{
reject("return money");
}
});
//handling promise
mypromise
.then(result=>{
console.log(result);
})
.catch(error=>{
console.log(error);
});

</script>

</html>
